<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dividenden">
<meta name="theme-color" content="#f5f4f0" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#1a1916" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>A1JX52 – Dividenden-Rechner</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --border-strong: #c8c4bb;
    --text: #1a1916;
    --text-muted: #6b6860;
    --text-hint: #a09d97;
    --green: #2a7a4b;
    --red: #b03a2e;
    --accent: #1a1916;
    --radius: 10px;
    --font: 'DM Sans', 'Segoe UI', sans-serif;
    --font-mono: 'DM Mono', 'Fira Mono', monospace;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1916;
      --surface: #242320;
      --border: #38352f;
      --border-strong: #504d45;
      --text: #f0ede8;
      --text-muted: #9e9b94;
      --text-hint: #6b6860;
      --green: #4caf78;
      --red: #e06b5a;
      --accent: #f0ede8;
    }
  }

  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap');

  html { height: 100%; overflow-y: scroll; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100%;
    padding: calc(1rem + var(--safe-top)) 1rem calc(2rem + var(--safe-bottom));
    font-size: 15px;
    line-height: 1.5;
    transition: background 0.2s, color 0.2s;
    overscroll-behavior-y: contain;
  }

  .wrapper { max-width: 560px; margin: 0 auto; }

  #ptr {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 0;
    overflow: hidden;
    transition: height 0.2s;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--text-hint);
    gap: 6px;
  }
  #ptr.visible { height: 44px; }
  .ptr-spinner {
    width: 14px; height: 14px;
    border: 1.5px solid var(--border-strong);
    border-top-color: var(--text-muted);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  #ptr.loading .ptr-spinner { display: block; }
  #ptr.loading .ptr-arrow { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  header { margin: 0.5rem 0 1.5rem; }
  header h1 { font-size: 22px; font-weight: 500; letter-spacing: -0.3px; margin-bottom: 2px; }
  header p { font-size: 13px; color: var(--text-muted); font-family: var(--font-mono); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 10px;
    transition: background 0.2s, border-color 0.2s;
  }

  .card-label {
    font-size: 11px;
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-hint);
    margin-bottom: 12px;
  }

  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 5px; }

  input[type=number], select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 16px;
    font-family: var(--font-mono);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s, background 0.2s;
    -moz-appearance: textfield;
  }

  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }

  input[type=number]:focus, select:focus {
    border-color: var(--border-strong);
    background: var(--surface);
  }

  select { cursor: pointer; }

  .kurs-row { display: flex; gap: 8px; align-items: flex-end; }
  .kurs-row > div { flex: 1; }

  .kurs-hint { font-size: 11px; font-family: var(--font-mono); color: var(--text-hint); margin-top: 5px; }

  button {
    background: var(--text);
    color: var(--bg);
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
    white-space: nowrap;
    margin-bottom: 22px;
    transition: opacity 0.15s;
    -webkit-tap-highlight-color: transparent;
  }

  button:hover { opacity: 0.8; }
  button:active { opacity: 0.6; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .toggle-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .toggle-row input[type=checkbox] { width: 15px; height: 15px; accent-color: var(--accent); cursor: pointer; }
  .toggle-row label { font-size: 13px; color: var(--text); margin: 0; cursor: pointer; }

  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 16px; }
  .metric { background: var(--bg); border-radius: 8px; padding: 10px 12px; transition: background 0.2s; }
  .metric-label { font-size: 11px; font-family: var(--font-mono); color: var(--text-hint); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.06em; }
  .metric-value { font-size: 20px; font-weight: 500; font-family: var(--font-mono); color: var(--text); }
  .metric-value.green { color: var(--green); }

  .rows { border-top: 1px solid var(--border); }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .row:last-child { border-bottom: none; }
  .row-label { color: var(--text-muted); }
  .row-value { font-family: var(--font-mono); font-weight: 500; color: var(--text); }
  .row-value.neg { color: var(--red); }
  .row-value.pos { color: var(--green); }
  .row.total .row-label { color: var(--text); font-weight: 500; }

  .footer-note { font-size: 12px; color: var(--text-hint); text-align: center; margin-top: 1.5rem; font-family: var(--font-mono); }

  .etf-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .etf-price { font-size: 28px; font-weight: 500; font-family: var(--font-mono); letter-spacing: -0.5px; }
  .etf-right { text-align: right; }
  .etf-change { font-size: 14px; font-weight: 500; font-family: var(--font-mono); }
  .etf-change.pos { color: var(--green); }
  .etf-change.neg { color: var(--red); }
  .etf-sub { font-size: 12px; color: var(--text-hint); font-family: var(--font-mono); margin-top: 2px; }
  .etf-hint { font-size: 11px; font-family: var(--font-mono); color: var(--text-hint); margin-top: 8px; }
  .etf-stale { font-size: 11px; font-family: var(--font-mono); color: var(--red); margin-top: 4px; }
  .chart-wrap { position: relative; height: 60px; margin: 10px 0 0; }
  canvas#etf-chart { width: 100%; height: 60px; }
  .chart-skeleton { height: 60px; background: var(--bg); border-radius: 4px; margin-top: 10px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
  .chart-skeleton span { font-size: 12px; color: var(--text-hint); font-family: var(--font-mono); }
</style>
</head>
<body>

<div id="ptr">
  <span class="ptr-arrow">↓</span>
  <div class="ptr-spinner"></div>
  <span id="ptr-label">Nach unten ziehen…</span>
</div>

<div class="wrapper">
  <header>
    <h1>Dividenden-Rechner</h1>
    <p>Vanguard FTSE All-World · WKN A1JX52 · Quartalsausschüttung</p>
  </header>

  <div class="card" id="etf-card">
    <p class="card-label">ETF-Kurs · VWRL.F · Frankfurt</p>
    <div class="etf-header">
      <div>
        <div class="etf-price" id="etf-price">–</div>
        <div class="etf-sub" id="etf-depot"></div>
      </div>
      <div class="etf-right">
        <div class="etf-change" id="etf-change">–</div>
        <div class="etf-sub" id="etf-time"></div>
      </div>
    </div>
    <div class="chart-wrap">
      <div class="chart-skeleton" id="chart-skeleton"><span>Kursverlauf wird geladen…</span></div>
      <canvas id="etf-chart" style="display:none;"></canvas>
    </div>
    <p class="etf-hint" id="etf-hint"></p>
    <p class="etf-stale" id="etf-stale" style="display:none;"></p>
  </div>

  <div class="card">
    <p class="card-label">Depot</p>
    <div class="grid2">
      <div>
        <label>Anzahl Anteile</label>
        <input type="number" id="anteile" value="3640.373953" step="0.000001" min="0" inputmode="decimal">
      </div>
      <div>
        <label>Ausschüttung / Anteil (USD)</label>
        <input type="number" id="usd" value="0.40" step="0.01" min="0" inputmode="decimal">
      </div>
    </div>
  </div>

  <div class="card">
    <p class="card-label">USD / EUR</p>
    <div class="kurs-row">
      <div>
        <label>Wechselkurs (1 USD = x EUR)</label>
        <input type="number" id="eurusd" value="0.8724" step="0.0001" min="0.0001" inputmode="decimal">
        <p class="kurs-hint" id="kurs-hint">Manuell eingetragen</p>
      </div>
      <button id="kurs-btn" onclick="fetchKurs(false)">↻ Kurs abrufen</button>
    </div>
  </div>

  <div class="card">
    <p class="card-label">Steuern</p>
    <div class="grid2">
      <div>
        <label>Sparerpauschbetrag (€)</label>
        <input type="number" id="freibetrag" value="1000" step="50" min="0" inputmode="decimal">
      </div>
      <div>
        <label>Kirchensteuer</label>
        <select id="kirche">
          <option value="0">Keine</option>
          <option value="0.08">8 % (BY, BW)</option>
          <option value="0.09">9 % (übrige Länder)</option>
        </select>
      </div>
    </div>
    <div class="toggle-row">
      <input type="checkbox" id="teilfrei" checked>
      <label for="teilfrei">Teilfreistellung 30 % (Aktien-ETF)</label>
    </div>
  </div>

  <div class="card">
    <p class="card-label">Ergebnis</p>
    <div class="metrics" id="metrics"></div>
    <div class="rows" id="rows"></div>
  </div>

  <p class="footer-note">Kurse: frankfurter.app · Yahoo Finance · Werte lokal gespeichert</p>
</div>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
  }

  const FIELDS = ['anteile','eurusd','usd','freibetrag','kirche','teilfrei'];
  const LS_KEY = 'a1jx52_rechner';
  const LS_ETF = 'a1jx52_etf_cache';

  function haptic(type) {
    try {
      if (window.navigator && window.navigator.vibrate) {
        if (type === 'light') navigator.vibrate(10);
        else if (type === 'success') navigator.vibrate([10, 40, 10]);
        else navigator.vibrate(30);
      }
    } catch(e) {}
  }

  function loadSaved() {
    try {
      const saved = JSON.parse(localStorage.getItem(LS_KEY) || '{}');
      FIELDS.forEach(id => {
        if (saved[id] === undefined) return;
        const el = document.getElementById(id);
        if (el.type === 'checkbox') el.checked = saved[id];
        else el.value = saved[id];
      });
    } catch(e) {}
  }

  function saveValues() {
    try {
      const data = {};
      FIELDS.forEach(id => {
        const el = document.getElementById(id);
        data[id] = el.type === 'checkbox' ? el.checked : el.value;
      });
      localStorage.setItem(LS_KEY, JSON.stringify(data));
    } catch(e) {}
  }

  FIELDS.forEach(id => {
    const el = document.getElementById(id);
    const evt = el.tagName === 'SELECT' ? 'change' : 'input';
    el.addEventListener(evt, () => { saveValues(); calc(); });
  });

  function fmt(n) {
    return n.toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  async function fetchKurs(silent) {
    const btn = document.getElementById('kurs-btn');
    const hint = document.getElementById('kurs-hint');
    btn.textContent = '…';
    btn.disabled = true;
    if (!silent) hint.textContent = 'Wird abgerufen…';
    try {
      const res = await fetch('https://api.frankfurter.app/latest?from=USD&to=EUR');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      const rate = data.rates.EUR;
      document.getElementById('eurusd').value = rate.toFixed(4);
      const now = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      hint.textContent = 'Aktualisiert um ' + now + ' · frankfurter.app';
      saveValues();
      calc();
      if (!silent) haptic('success');
    } catch(err) {
      hint.textContent = 'Abruf fehlgeschlagen – bitte manuell eintragen';
    } finally {
      btn.textContent = '↻ Kurs abrufen';
      btn.disabled = false;
    }
  }

  function calc() {
    const anteile  = parseFloat(document.getElementById('anteile').value)    || 0;
    const usdeur   = parseFloat(document.getElementById('eurusd').value)     || 1;
    const usd      = parseFloat(document.getElementById('usd').value)        || 0;
    const fb       = parseFloat(document.getElementById('freibetrag').value) || 0;
    const kirche   = parseFloat(document.getElementById('kirche').value);
    const teilfrei = document.getElementById('teilfrei').checked;

    const brutto     = usd * anteile * usdeur;
    const stpf       = teilfrei ? brutto * 0.70 : brutto;
    const fbVerb     = Math.min(stpf, fb);
    const stpfNachFb = Math.max(0, stpf - fbVerb);
    const kistSatz   = kirche > 0 ? kirche / (1 + 0.055 * kirche) : 0;
    const ast        = 0.25 / (1 + 0.055 * 0.25 + kistSatz * 0.25);
    const steuer     = stpfNachFb * (ast + ast * 0.055 + ast * kirche);
    const netto      = brutto - steuer;
    const eur_pro_ant = usd * usdeur;

    document.getElementById('metrics').innerHTML = `
      <div class="metric"><p class="metric-label">Brutto</p><p class="metric-value">${fmt(brutto)} €</p></div>
      <div class="metric"><p class="metric-label">Steuer</p><p class="metric-value">${fmt(steuer)} €</p></div>
      <div class="metric"><p class="metric-label">Netto</p><p class="metric-value green">${fmt(netto)} €</p></div>
    `;

    document.getElementById('rows').innerHTML = `
      <div class="row"><span class="row-label">Brutto (${fmt(eur_pro_ant)} €/Anteil)</span><span class="row-value">${fmt(brutto)} €</span></div>
      <div class="row"><span class="row-label">Steuerpflichtiger Anteil${teilfrei ? ' (70 %)' : ''}</span><span class="row-value">${fmt(stpf)} €</span></div>
      ${fbVerb > 0 ? `<div class="row"><span class="row-label">Sparerpauschbetrag</span><span class="row-value neg">− ${fmt(fbVerb)} €</span></div>` : ''}
      <div class="row"><span class="row-label">Stpfl. nach Freibetrag</span><span class="row-value">${fmt(stpfNachFb)} €</span></div>
      <div class="row"><span class="row-label">Steuer (AbgSt + SolZ${kirche > 0 ? ' + KiSt' : ''})</span><span class="row-value neg">− ${fmt(steuer)} €</span></div>
      <div class="row total"><span class="row-label">Netto</span><span class="row-value pos">${fmt(netto)} €</span></div>
    `;
  }

  function renderETF(current, open, prices) {
    const change = current - open;
    const changePct = (change / open) * 100;
    const isPos = change >= 0;
    const anteile = parseFloat(document.getElementById('anteile').value) || 0;

    document.getElementById('etf-price').textContent = fmt(current) + ' €';
    const changeEl = document.getElementById('etf-change');
    changeEl.textContent = (isPos ? '+' : '') + fmt(change) + ' € (' + (isPos ? '+' : '') + changePct.toFixed(2) + ' %)';
    changeEl.className = 'etf-change ' + (isPos ? 'pos' : 'neg');

    if (anteile > 0) {
      const depotWert = current * anteile;
      document.getElementById('etf-depot').textContent = 'Depotwert: ' + depotWert.toLocaleString('de-DE', { minimumFractionDigits: 0, maximumFractionDigits: 0 }) + ' €';
    }

    drawChart(prices, open, isPos);
  }

  function showCachedETF() {
    try {
      const cached = JSON.parse(localStorage.getItem(LS_ETF));
      if (!cached) return false;
      renderETF(cached.price, cached.open, cached.prices);
      const staleEl = document.getElementById('etf-stale');
      staleEl.style.display = 'block';
      staleEl.textContent = 'Offline – letzter Stand: ' + cached.time;
      document.getElementById('etf-hint').textContent = 'Quelle: Yahoo Finance · XETRA-Handelstag';
      return true;
    } catch(e) { return false; }
  }

  function saveETFCache(price, open, prices) {
    try {
      const now = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
      localStorage.setItem(LS_ETF, JSON.stringify({ price, open, prices, time: now }));
    } catch(e) {}
  }

  const ETF_PROXIES = [
    url => 'https://corsproxy.io/?' + encodeURIComponent(url),
    url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url),
  ];

  async function fetchETF() {
    const url = 'https://query1.finance.yahoo.com/v8/finance/chart/VWRL.F?interval=5m&range=1d';

    for (const proxyFn of ETF_PROXIES) {
      try {
        const res = await fetch(proxyFn(url), { signal: AbortSignal.timeout(8000) });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        const result = json.chart.result[0];
        const meta = result.meta;
        const closes = result.indicators.quote[0].close;
        const timestamps = result.timestamp;

        const validPairs = timestamps.map((t, i) => ({ t, c: closes[i] })).filter(p => p.c !== null);
        if (validPairs.length === 0) throw new Error('no data');

        const current = meta.regularMarketPrice || validPairs[validPairs.length - 1].c;
        const open = meta.chartPreviousClose || validPairs[0].c;
        const prices = validPairs.map(p => p.c);

        renderETF(current, open, prices);
        saveETFCache(current, open, prices);

        const now = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('etf-time').textContent = 'Stand: ' + now;
        document.getElementById('etf-hint').textContent = 'Quelle: Yahoo Finance · XETRA-Handelstag';
        document.getElementById('etf-stale').style.display = 'none';
        return;
      } catch(e) {
        continue;
      }
    }

    const hadCache = showCachedETF();
    if (!hadCache) {
      document.getElementById('chart-skeleton').innerHTML = '<span>Kursdaten nicht verfügbar</span>';
      document.getElementById('etf-hint').textContent = 'Kurs konnte nicht geladen werden';
    }
  }

  function drawChart(prices, open, isPos) {
    const skeleton = document.getElementById('chart-skeleton');
    const canvas = document.getElementById('etf-chart');
    skeleton.style.display = 'none';
    canvas.style.display = 'block';

    const dpr = window.devicePixelRatio || 1;
    const W = canvas.parentElement.clientWidth;
    const H = 60;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    const min = Math.min(...prices, open) * 0.9995;
    const max = Math.max(...prices, open) * 1.0005;
    const range = max - min || 1;

    const toX = i => (i / (prices.length - 1)) * W;
    const toY = v => H - ((v - min) / range) * (H - 4) - 2;

    const color = isPos ? '#2a7a4b' : '#b03a2e';
    const colorFill = isPos ? 'rgba(42,122,75,0.08)' : 'rgba(176,58,46,0.08)';

    const baseY = toY(open);
    ctx.beginPath();
    ctx.setLineDash([3, 3]);
    ctx.moveTo(0, baseY);
    ctx.lineTo(W, baseY);
    ctx.strokeStyle = 'rgba(160,157,151,0.4)';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.setLineDash([]);

    ctx.beginPath();
    ctx.moveTo(toX(0), toY(prices[0]));
    prices.forEach((p, i) => ctx.lineTo(toX(i), toY(p)));
    ctx.lineTo(toX(prices.length - 1), H);
    ctx.lineTo(toX(0), H);
    ctx.closePath();
    ctx.fillStyle = colorFill;
    ctx.fill();

    ctx.beginPath();
    ctx.moveTo(toX(0), toY(prices[0]));
    prices.forEach((p, i) => ctx.lineTo(toX(i), toY(p)));
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.lineJoin = 'round';
    ctx.stroke();
  }

  // Pull-to-refresh
  (function() {
    let startY = 0, currentY = 0, pulling = false;
    const THRESHOLD = 72;
    const ptr = document.getElementById('ptr');
    const ptrLabel = document.getElementById('ptr-label');

    document.addEventListener('touchstart', e => {
      if (window.scrollY === 0) {
        startY = e.touches[0].clientY;
        pulling = true;
      }
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (!pulling) return;
      currentY = e.touches[0].clientY;
      const dist = Math.max(0, currentY - startY);
      if (dist > 8) {
        const h = Math.min(dist * 0.5, 56);
        ptr.style.height = h + 'px';
        ptr.classList.toggle('visible', h > 16);
        ptrLabel.textContent = h >= THRESHOLD * 0.5 ? 'Zum Aktualisieren loslassen' : 'Nach unten ziehen…';
      }
    }, { passive: true });

    document.addEventListener('touchend', async () => {
      if (!pulling) return;
      pulling = false;
      const dist = currentY - startY;
      if (dist >= THRESHOLD) {
        ptr.classList.add('loading');
        ptr.style.height = '44px';
        ptrLabel.textContent = 'Wird aktualisiert…';
        haptic('light');
        await Promise.all([fetchKurs(true), fetchETF()]);
        haptic('success');
      }
      ptr.style.transition = 'height 0.25s';
      ptr.style.height = '0';
      setTimeout(() => {
        ptr.classList.remove('visible', 'loading');
        ptr.style.transition = '';
      }, 260);
      startY = 0; currentY = 0;
    }, { passive: true });
  })();

  loadSaved();
  calc();
  showCachedETF();
  fetchKurs(true);
  fetchETF();
</script>
</body>
</html>
